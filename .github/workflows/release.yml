name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

env:
  APP_NAME: embyproxy
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-arm64
            goos: windows
            goarch: arm64
            extension: .exe
            archive: zip
          - name: windows-amd64
            goos: windows
            goarch: amd64
            extension: .exe
            archive: zip
          - name: linux-arm64
            goos: linux
            goarch: arm64
            extension: ""
            archive: tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            extension: ""
            archive: tar.gz
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            extension: ""
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          binary="${APP_NAME}-${DATE}-${{ matrix.name }}${{ matrix.extension }}"
          version="${DATE}"
          commit="${GITHUB_SHA::7}"
          built_at="$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')"
          ldflags="-s -w"
          ldflags="${ldflags} -X embyproxy/internal/buildinfo.Version=${version}"
          ldflags="${ldflags} -X embyproxy/internal/buildinfo.Commit=${commit}"
          ldflags="${ldflags} -X embyproxy/internal/buildinfo.BuiltAt=${built_at}"
          go build -trimpath -ldflags="${ldflags}" -o "dist/${binary}" ./cmd/embyproxy
          cp .env.example dist/.env.example

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip "${APP_NAME}-${DATE}-${{ matrix.name }}.zip" "${binary}" .env.example)
          else
            (cd dist && tar -czf "${APP_NAME}-${DATE}-${{ matrix.name }}.tar.gz" "${binary}" .env.example)
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > sha256sums.txt

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber
          else
            gh release create "${TAG_NAME}" dist/* --title "${TAG_NAME}" --generate-notes
          fi

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}/embyproxy" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build metadata
        id: build_meta
        shell: bash
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          echo "version=${DATE}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "built_at=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            COMMIT=${{ steps.build_meta.outputs.commit }}
            BUILT_AT=${{ steps.build_meta.outputs.built_at }}
