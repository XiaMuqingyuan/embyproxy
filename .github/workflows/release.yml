name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build all binaries
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          mkdir -p dist

          # Build linux/amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X embyproxy/internal/buildinfo.Version=${DATE} -X embyproxy/internal/buildinfo.Commit=${GITHUB_SHA::7} -X embyproxy/internal/buildinfo.BuiltAt=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" \
            -o "dist/embyproxy-${DATE}-linux-amd64" ./cmd/embyproxy

          # Build linux/arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X embyproxy/internal/buildinfo.Version=${DATE} -X embyproxy/internal/buildinfo.Commit=${GITHUB_SHA::7} -X embyproxy/internal/buildinfo.BuiltAt=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" \
            -o "dist/embyproxy-${DATE}-linux-arm64" ./cmd/embyproxy

          # Build linux/armv7
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X embyproxy/internal/buildinfo.Version=${DATE} -X embyproxy/internal/buildinfo.Commit=${GITHUB_SHA::7} -X embyproxy/internal/buildinfo.BuiltAt=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" \
            -o "dist/embyproxy-${DATE}-linux-armv7" ./cmd/embyproxy

          # Build windows/amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X embyproxy/internal/buildinfo.Version=${DATE} -X embyproxy/internal/buildinfo.Commit=${GITHUB_SHA::7} -X embyproxy/internal/buildinfo.BuiltAt=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" \
            -o "dist/embyproxy-${DATE}-windows-amd64.exe" ./cmd/embyproxy

          # Build windows/arm64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X embyproxy/internal/buildinfo.Version=${DATE} -X embyproxy/internal/buildinfo.Commit=${GITHUB_SHA::7} -X embyproxy/internal/buildinfo.BuiltAt=$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')" \
            -o "dist/embyproxy-${DATE}-windows-arm64.exe" ./cmd/embyproxy

          # Copy config file
          cp .env.example dist/.env.example

      - name: Package archives
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          cd dist

          # Linux archives
          tar -czf "embyproxy-${DATE}-linux-amd64.tar.gz" "embyproxy-${DATE}-linux-amd64" .env.example
          tar -czf "embyproxy-${DATE}-linux-arm64.tar.gz" "embyproxy-${DATE}-linux-arm64" .env.example
          tar -czf "embyproxy-${DATE}-linux-armv7.tar.gz" "embyproxy-${DATE}-linux-armv7" .env.example

          # Windows archives
          zip "embyproxy-${DATE}-windows-amd64.zip" "embyproxy-${DATE}-windows-amd64.exe" .env.example
          zip "embyproxy-${DATE}-windows-arm64.zip" "embyproxy-${DATE}-windows-arm64.exe" .env.example

          # Create checksums
          sha256sum * > sha256sums.txt

          # Clean up raw binaries
          rm -f embyproxy-${DATE}-linux-amd64 embyproxy-${DATE}-linux-arm64 embyproxy-${DATE}-linux-armv7 embyproxy-${DATE}-windows-amd64.exe embyproxy-${DATE}-windows-arm64.exe .env.example

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          cd dist
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            embyproxy-${DATE}-linux-amd64.tar.gz \
            embyproxy-${DATE}-linux-arm64.tar.gz \
            embyproxy-${DATE}-linux-armv7.tar.gz \
            embyproxy-${DATE}-windows-amd64.zip \
            embyproxy-${DATE}-windows-arm64.zip \
            sha256sums.txt
