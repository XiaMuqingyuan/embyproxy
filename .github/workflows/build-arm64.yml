name: Build ARM64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build binary
        id: build
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          binary="embyproxy-${DATE}-linux-arm64"
          version="${DATE}"
          commit="$(git rev-parse --short HEAD)"
          built_at="$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')"
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w \
              -X embyproxy/internal/buildinfo.Version=${version} \
              -X embyproxy/internal/buildinfo.Commit=${commit} \
              -X embyproxy/internal/buildinfo.BuiltAt=${built_at}" \
            -o "${binary}" \
            ./cmd/embyproxy
          echo "binary=${binary}" >> "$GITHUB_OUTPUT"

      - name: Verify binary architecture
        run: |
          file ${{ steps.build.outputs.binary }}
          ls -lh ${{ steps.build.outputs.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: embyproxy-linux-arm64
          path: ${{ steps.build.outputs.binary }}
          if-no-files-found: error
