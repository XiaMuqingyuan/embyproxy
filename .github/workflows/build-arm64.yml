name: Build ARM64

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build binary
        run: |
          DATE="$(TZ=Asia/Shanghai date +'%Y%m%d')"
          binary="embyproxy-${DATE}-linux-arm64"
          version="${DATE}"
          commit="$(git rev-parse --short HEAD)"
          built_at="$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S%:z')"
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w \
              -X embyproxy/internal/buildinfo.Version=${version} \
              -X embyproxy/internal/buildinfo.Commit=${commit} \
              -X embyproxy/internal/buildinfo.BuiltAt=${built_at}" \
            -o "${binary}" \
            ./cmd/embyproxy

      - name: Verify binary architecture
        run: |
          file embyproxy-*.linux-arm64
          ls -lh embyproxy-*.linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: embyproxy-linux-arm64
          path: embyproxy-*.linux-arm64
          if-no-files-found: error

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: embyproxy-*.linux-arm64
          generate_release_notes: true
